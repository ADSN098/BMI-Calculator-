<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI</title>
    <link rel="stylesheet" href="./img/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

</head>

<body >
    <div class="mt-5 w-100 ">
        <div class="bg-info w-50 ms-auto me-auto p-3 rounded text-center shadow mb-5">
            <h1>BODY MASS INDEX CALCULATOR</h1>
        </div>
        <div class="bg-info w-50 ms-auto me-auto p-5 rounded  shadow ">
            <div class="w-100 col text-center">
                <div>
                    <label for="" class="form-label"><h5>Enter Your Height :</h5></label>
                    <input type="number" class="form-control w-100" id="ht" aria-describedby="emailHelp"
                        placeholder="Height(meters)"><br>
                    <label for="" class="form-label"><h5>Enter Your Weight :</h5></label>
                    <input type="number" class="form-control" id="wt" placeholder="Weight(kg)">
                    <div class="text-center"><button onclick="calc()" type="submit" class="btn btn-light px-4 fw-medium mt-3 border">BMI</button></div>
                </div>
            </div>
            <div id="result" class="bg-light rounded shadow w-75 ms-auto me-auto mt-4 text-center"> </div>
        </div>
        
    </div>

</body>
</div>
<script>
    function calc() {
        let w = document.getElementById("wt").value;
        let h = document.getElementById("ht").value;
        let result = document.getElementById("result");
        let bmi = w / h ** 2;
        if (!w||!h) {
            alert("Please fill all fields");
        }else{
        result.innerHTML = `<h3 class="p-2 ">YOUR BMI IS ${bmi}</h3>`

        }
         
        
    }


    
</script>

</html>
